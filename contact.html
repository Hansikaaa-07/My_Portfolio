                    <!-- FORMSPREE: Put your ID here -->
                    <form id="contactForm" action="https://formspree.io/f/mpqokdyo" method="POST">
                        <div class="mb-3"><input type="text" name="name" class="form-control glass-input" placeholder="Name" required></div>

                            </div>
                            <small id="phoneErr" class="text-danger"></small>
                        </div>
                        <div class="mb-3"><textarea name="message" class="form-control glass-input" rows="4" placeholder="Your Message" required></textarea></div>
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Send Message</button>
